<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inventario Firebase</title>
</head>
<body>

    <h1>Gestión de Inventario (Firebase)</h1>

    <h3 id="form-title">Añadir Nuevo Producto</h3>
    <form id="product-form">
        <input type="hidden" id="edit-id" value="">
        
        <label>Código de Producto:</label>
        <input type="text" id="codigo" required><br><br>

        <label>Nombre:</label>
        <input type="text" id="nombre" required><br><br>

        <label>Tipo:</label>
        <select id="tipo" onchange="toggleStock()">
            <option value="materia_prima">Materia Prima</option>
            <option value="receta">Receta</option>
        </select><br><br>

        <label>Stock:</label>
        <input type="number" id="stock" min="0" required><br><br>

        <label>Proveedor:</label>
        <input type="text" id="proveedor" required><br><br>

        <button type="submit" id="btn-submit">Guardar Producto</button>
    </form>

    <hr>

    <h3>Buscar Producto</h3>
    <label>Buscar por Código:</label>
    <input type="text" id="buscar-codigo" placeholder="Escribe el código aquí..." oninput="renderTable()"><br><br>

    <h3>Productos Guardados</h3>
    <table>
        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Proveedor</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="inventory-table-body">
            <tr><td colspan="6">Cargando productos...</td></tr>
        </tbody>
    </table>

    <script src="inventario.js"></script>
</body>
</html>
