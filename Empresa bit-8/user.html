<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios</title>
</head>
<body>
    <div class="nav">
        <a href="user.html">GESTION DE USUARIO</a>
        <a href="inventario.html">INVENTARIO</a>
        <a href="producion.html">PRODUCCION</a>
        <a href="login.html">CERRAR SESION</a>
    </div>

    <div class="container">
        <h2>Gestion de Usuarios</h2>
        
        <div>
            <label for="buscador-cc"><strong>Buscar por CC:</strong></label>
            <input 
                type="text" 
                id="buscador-cc" 
                placeholder="Escribe la cédula..." 
                oninput="filtrarUsuarios()"
            >
        </div>

        <button onclick="mostrarFormulario()">Añadir Usuario</button>

        <div id="contenedor-formulario" style="display: none;">
            <div class="form-group">
                <input type="number" id="CC" placeholder="CC:109899100" required>
                <input type="text" id="nombreReal" placeholder="Nombre Real" required>
                <input type="password" id="pass" placeholder="CONTRASEÑA(EJ:1234_A)" required>
                <input type="password" id="passConfirm" placeholder="Confirma tu contraseña">
                <select id="cargos">
                    <option value="" disabled selected>cual es tu Cargo</option>
                    <option value="client">Cliente</option>
                    <option value="empleado">Empleado</option>
                    <option value="socio">Socio</option>
                </select>
                <button type="button" onclick="registrarNuevoUsuario()">Guardar Usuario</button>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>CC</th>
                    <th>Nombre</th>
                    <th>Cargo</th>
                </tr>
            </thead>
            <tbody id="tabla-usuarios">
                </tbody>
        </table>
    </div>

    <script src="user.js"></script>
</body>
</html>
